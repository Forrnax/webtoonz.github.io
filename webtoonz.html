<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyToon - Kişisel Okuyucu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lucide simgelerini React bileşeni olarak kullanmak için yardımcı fonksiyon
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { strokeWidth: 2, size, class: className }
                        });
                    }
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // VERİTABANI AYARLARI
        const DB_NAME = 'WebtoonVault_Offline';
        const STORES = { WEBTOONS: 'webtoons', HISTORY: 'history' };

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORES.WEBTOONS)) db.createObjectStore(STORES.WEBTOONS, { keyPath: 'id' });
                    if (!db.objectStoreNames.contains(STORES.HISTORY)) db.createObjectStore(STORES.HISTORY, { keyPath: 'webtoonId' });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject("DB Error");
            });
        };

        const dbOp = {
            save: async (storeName, data) => {
                const db = await initDB();
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(data);
                return new Promise(r => tx.oncomplete = r);
            },
            getAll: async (storeName) => {
                const db = await initDB();
                return new Promise(r => {
                    const req = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
                    req.onsuccess = () => r(req.result || []);
                });
            },
            remove: async (storeName, id) => {
                const db = await initDB();
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).delete(id);
                return new Promise(r => tx.oncomplete = r);
            }
        };

        function App() {
            const [view, setView] = useState('library');
            const [webtoons, setWebtoons] = useState([]);
            const [history, setHistory] = useState([]);
            const [activeWebtoon, setActiveWebtoon] = useState(null);
            const [activeChapter, setActiveChapter] = useState(null);
            const [loading, setLoading] = useState(true);
            const fileInputRef = useRef(null);

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const w = await dbOp.getAll(STORES.WEBTOONS);
                const h = await dbOp.getAll(STORES.HISTORY);
                setWebtoons(w);
                setHistory(h.sort((a,b) => b.timestamp - a.timestamp));
                setLoading(false);
                setTimeout(() => lucide.createIcons(), 100);
            };

            const handleAddWebtoon = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const file = e.target.coverFile.files[0];
                let cover = "https://images.unsplash.com/photo-1578632738980-30560731604a?w=400";

                if (file) {
                    cover = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result);
                        reader.readAsDataURL(file);
                    });
                }

                const newW = {
                    id: Date.now().toString(),
                    title: formData.get('title'),
                    author: formData.get('author'),
                    description: formData.get('description'),
                    cover,
                    chapters: []
                };

                await dbOp.save(STORES.WEBTOONS, newW);
                setWebtoons([...webtoons, newW]);
                setView('library');
            };

            const handleAddChapter = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const files = Array.from(e.target.chapterFiles.files);
                
                const images = await Promise.all(
                    files.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}))
                    .map(f => new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result);
                        reader.readAsDataURL(f);
                    }))
                );

                const newCh = {
                    id: Date.now().toString(),
                    number: formData.get('number'),
                    title: formData.get('title'),
                    images
                };

                const updated = { ...activeWebtoon, chapters: [...activeWebtoon.chapters, newCh].sort((a,b) => a.number - b.number) };
                await dbOp.save(STORES.WEBTOONS, updated);
                setActiveWebtoon(updated);
                setWebtoons(webtoons.map(w => w.id === updated.id ? updated : w));
                e.target.reset();
            };

            const backup = async () => {
                const data = { webtoons, history, date: new Date().toLocaleDateString() };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mytoon-yedek.json`;
                a.click();
            };

            const restore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const data = JSON.parse(ev.target.result);
                    for (let w of data.webtoons) await dbOp.save(STORES.WEBTOONS, w);
                    for (let h of data.history) await dbOp.save(STORES.HISTORY, h);
                    loadData();
                    alert("Yükleme Başarılı!");
                };
                reader.readAsText(file);
            };

            const openReader = async (w, c) => {
                setActiveWebtoon(w);
                setActiveChapter(c);
                const hItem = { webtoonId: w.id, chapterId: c.id, chapterNumber: c.number, title: w.title, cover: w.cover, timestamp: Date.now() };
                await dbOp.save(STORES.HISTORY, hItem);
                setHistory([hItem, ...history.filter(i => i.webtoonId !== w.id)].slice(0, 10));
                setView('reader');
                window.scrollTo(0,0);
            };

            if (loading) return <div className="h-screen flex items-center justify-center">Yükleniyor...</div>;

            return (
                <div className="min-h-screen">
                    <input type="file" className="hidden" ref={fileInputRef} onChange={restore} accept=".json" />
                    
                    {/* Header */}
                    {view !== 'reader' && (
                        <nav className="p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur flex justify-between items-center sticky top-0 z-50">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('library')}>
                                <Icon name="Book" className="text-indigo-500" />
                                <span className="font-bold text-xl">MY-TOON</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={backup} className="p-2 hover:bg-slate-800 rounded-lg" title="Yedekle"><Icon name="Download" size={20}/></button>
                                <button onClick={() => fileInputRef.current.click()} className="p-2 hover:bg-slate-800 rounded-lg" title="Geri Yükle"><Icon name="UploadCloud" size={20}/></button>
                                <button onClick={() => setView('add')} className="bg-indigo-600 px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg shadow-indigo-600/20"><Icon name="Plus" size={18}/> Yeni</button>
                            </div>
                        </nav>
                    )}

                    <main className="container mx-auto p-4 max-w-6xl">
                        {view === 'library' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                {history.length > 0 && (
                                    <div>
                                        <h2 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">Okumaya Devam Et</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            {history.slice(0,3).map(h => (
                                                <div key={h.webtoonId} onClick={() => {
                                                    const w = webtoons.find(x => x.id === h.webtoonId);
                                                    const c = w?.chapters.find(x => x.id === h.chapterId);
                                                    if (w && c) openReader(w, c);
                                                }} className="bg-slate-900 p-3 rounded-xl border border-slate-800 flex items-center gap-4 cursor-pointer hover:border-indigo-500 transition-all">
                                                    <img src={h.cover} className="w-12 h-16 object-cover rounded shadow" />
                                                    <div>
                                                        <div className="font-bold text-sm truncate w-40">{h.title}</div>
                                                        <div className="text-xs text-indigo-400">Bölüm {h.chapterNumber}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <h2 className="text-2xl font-bold mb-6">Kitaplığım</h2>
                                    {webtoons.length === 0 ? (
                                        <div className="text-center py-20 border-2 border-dashed border-slate-800 rounded-3xl text-slate-600">Henüz seri eklenmedi.</div>
                                    ) : (
                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6">
                                            {webtoons.map(w => (
                                                <div key={w.id} className="group cursor-pointer" onClick={() => { setActiveWebtoon(w); setView('detail'); }}>
                                                    <div className="aspect-[2/3] rounded-2xl overflow-hidden border border-slate-800 group-hover:border-indigo-500 transition-all shadow-xl">
                                                        <img src={w.cover} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                                    </div>
                                                    <h3 className="mt-3 font-bold text-sm truncate">{w.title}</h3>
                                                    <p className="text-[10px] text-slate-500 uppercase">{w.chapters.length} Bölüm</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'add' && (
                            <div className="max-w-md mx-auto bg-slate-900 p-8 rounded-3xl border border-slate-800 animate-in zoom-in-95 duration-300">
                                <h2 className="text-2xl font-bold mb-6">Yeni Seri Ekle</h2>
                                <form onSubmit={handleAddWebtoon} className="space-y-4">
                                    <input name="title" required className="w-full bg-slate-800 p-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500" placeholder="Seri Adı" />
                                    <input name="author" className="w-full bg-slate-800 p-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500" placeholder="Yazar" />
                                    <div className="relative border-2 border-dashed border-slate-700 p-6 rounded-xl text-center">
                                        <input type="file" name="coverFile" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <Icon name="Image" className="mx-auto mb-2 text-slate-500" />
                                        <span className="text-xs text-slate-500">Kapak Resmi Seç</span>
                                    </div>
                                    <textarea name="description" className="w-full bg-slate-800 p-3 rounded-xl h-24 outline-none border border-slate-700 focus:border-indigo-500" placeholder="Açıklama"></textarea>
                                    <button className="w-full bg-indigo-600 py-3 rounded-xl font-bold">Kaydet</button>
                                    <button type="button" onClick={() => setView('library')} className="w-full py-2 text-slate-500 text-sm">Vazgeç</button>
                                </form>
                            </div>
                        )}

                        {view === 'detail' && activeWebtoon && (
                            <div className="animate-in fade-in duration-500">
                                <button onClick={() => setView('library')} className="flex items-center gap-2 text-slate-500 mb-6 hover:text-white transition-colors">
                                    <Icon name="ChevronLeft" size={20} /> Geri Dön
                                </button>
                                <div className="flex flex-col md:flex-row gap-8 mb-12">
                                    <img src={activeWebtoon.cover} className="w-48 aspect-[2/3] object-cover rounded-2xl shadow-2xl border border-slate-800" />
                                    <div className="flex-1">
                                        <h1 className="text-4xl font-bold mb-2">{activeWebtoon.title}</h1>
                                        <p className="text-indigo-400 font-bold mb-4">{activeWebtoon.author}</p>
                                        <p className="text-slate-400 text-sm mb-6">{activeWebtoon.description || "Açıklama yok."}</p>
                                        
                                        <div className="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                                            <h3 className="text-xs font-bold uppercase text-slate-500 mb-4">Bölüm Ekle</h3>
                                            <form onSubmit={handleAddChapter} className="grid grid-cols-2 gap-3">
                                                <input name="number" type="number" step="0.1" placeholder="No" className="bg-slate-800 p-2 rounded-lg outline-none border border-slate-700" required />
                                                <input name="title" placeholder="Başlık" className="bg-slate-800 p-2 rounded-lg outline-none border border-slate-700" />
                                                <div className="col-span-2 relative border border-dashed border-slate-700 p-2 rounded-lg text-center">
                                                    <input type="file" name="chapterFiles" multiple accept="image/*" required className="absolute inset-0 opacity-0" />
                                                    <span className="text-xs text-slate-500">Resimleri Seç</span>
                                                </div>
                                                <button className="col-span-2 bg-indigo-600 py-2 rounded-lg font-bold text-sm">Bölümü Yayınla</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    {activeWebtoon.chapters.map(c => (
                                        <div key={c.id} onClick={() => openReader(activeWebtoon, c)} className="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center cursor-pointer hover:bg-slate-800">
                                            <span className="font-bold">Bölüm {c.number} <span className="ml-4 font-normal text-slate-400">{c.title}</span></span>
                                            <Icon name="ChevronRight" size={18} className="text-slate-600" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'reader' && activeChapter && (
                        <div className="fixed inset-0 bg-black z-[100] overflow-y-auto">
                            <div className="fixed top-0 inset-x-0 p-4 bg-black/60 backdrop-blur flex justify-between items-center z-50 opacity-0 hover:opacity-100 transition-opacity">
                                <button onClick={() => setView('detail')} className="bg-white/10 p-2 rounded-full"><Icon name="ChevronLeft" /></button>
                                <span className="font-bold text-sm">Bölüm {activeChapter.number}</span>
                                <div className="w-8"></div>
                            </div>
                            <div className="flex flex-col items-center">
                                {activeChapter.images.map((img, i) => (
                                    <img key={i} src={img} className="w-full max-w-3xl h-auto" loading="lazy" />
                                ))}
                                <div className="py-20 flex gap-4">
                                    <button onClick={() => setView('detail')} className="bg-slate-900 px-8 py-4 rounded-2xl font-bold border border-slate-800">Bölüm Listesi</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
